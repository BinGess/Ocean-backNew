services:
  - type: web
    name: ocean-back-new
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: ocean-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: "30"

databases:
  - name: ocean-postgres
    databaseName: ocean
    user: ocean
    plan: basic-256mb
    diskSizeGB: 15
    region: singapore
    postgresMajorVersion: "17"
